name: Build and Release

on:
  push:
    branches:
      - build
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android
            os: ubuntu-latest
          - target: ios
            os: macos-latest
          - target: linux
            os: ubuntu-latest
          - target: macos
            os: macos-latest
          - target: windows
            os: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        if: matrix.target == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Project
        shell: bash
        run: |
          flutter pub get
          if [ "${{ matrix.target }}" == "android" ]; then
            flutter build apk --release --no-tree-shake-icons
            flutter build apk --release --split-per-abi --no-tree-shake-icons
          elif [ "${{ matrix.target }}" == "ios" ]; then
            flutter build ios --release --no-codesign --no-tree-shake-icons
          elif [ "${{ matrix.target }}" == "linux" ]; then
            sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++6 libmpv-dev mpv
            flutter build linux --release
          elif [ "${{ matrix.target }}" == "macos" ]; then
            flutter build macos --release
          elif [ "${{ matrix.target }}" == "windows" ]; then
            flutter build windows --release
          fi

      - name: Install NSIS
        if: matrix.target == 'windows'
        run: choco install nsis -y

      - name: Package Windows EXE (NSIS)
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          $appName = (Select-String -Pattern "^name: " -Path pubspec.yaml).ToString().Split(":")[1].Trim()
          
          $buildDir = ""
          $pathsToTry = @(
            "build/windows/x64/runner/Release",
            "build/windows/x64/release/runner",
            "build/windows/runner/Release"
          )

          foreach ($path in $pathsToTry) {
              if (Test-Path $path) {
                  $buildDir = (Resolve-Path $path).Path
                  break
              }
          }

          if (-not $buildDir) { exit 1 }
          if (!(Test-Path "dist")) { New-Item -ItemType Directory -Force -Path "dist" }

          & "C:\Program Files (x86)\NSIS\makensis.exe" /DAPP_NAME="$appName" "/DBUILD_DIR=$buildDir" windows.nsi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/ios/iphoneos/*.app
            build/linux/x64/release/bundle/*
            build/macos/Build/Products/Release/*.app
            dist/*.exe
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get App Metadata
        id: meta
        run: |
          # Pulls lowercase name directly from pubspec
          APP_NAME=$(grep '^name: ' pubspec.yaml | sed 's/name: //' | xargs)
          VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | cut -d '+' -f 1 | xargs)
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare and Rename Assets
        run: |
          mkdir -p dist
          NAME="${{ steps.meta.outputs.app_name }}"
          
          # Use lowercase NAME for all file outputs
          find artifacts -name "*.exe" -exec cp {} dist/ \;
          find artifacts -name "app-release.apk" -exec cp {} dist/$NAME-android-universal.apk \;
          find artifacts -name "app-armeabi-v7a-release.apk" -exec cp {} dist/$NAME-android-arm.apk \;
          find artifacts -name "app-arm64-v8a-release.apk" -exec cp {} dist/$NAME-android-aarch64.apk \;
          find artifacts -name "app-x86_64-release.apk" -exec cp {} dist/$NAME-android-x86_64.apk \;
          
          IOS_APP_PATH=$(find artifacts -type d -name "*.app" | grep "iphoneos" | head -n 1)
          if [ -d "$IOS_APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$IOS_APP_PATH" Payload/
            zip -r dist/$NAME-ios-aarch64.ipa Payload
            rm -rf Payload
          fi

          MAC_APP_PATH=$(find artifacts -type d -name "*.app" | grep "macos" | head -n 1)
          if [ -d "$MAC_APP_PATH" ]; then
            sudo apt-get update && sudo apt-get install -y genisoimage
            mkdir -p mac_dmg_folder
            cp -r "$MAC_APP_PATH" mac_dmg_folder/
            genisoimage -V "RecomBox" -D -R -apple -o dist/$NAME-macos-aarch64.dmg mac_dmg_folder/
            rm -rf mac_dmg_folder
          fi

          LINUX_PATH=$(find artifacts -type d -name "bundle" | head -n 1)
          if [ -d "$LINUX_PATH" ]; then
            tar -czf dist/$NAME-linux-x86_64.tar.gz -C "$LINUX_PATH" .
          fi

      - name: Create latest.json
        run: |
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/v${{ steps.meta.outputs.version }}"
          NAME="${{ steps.meta.outputs.app_name }}"
          jq -n \
            --arg version "${{ steps.meta.outputs.version }}" \
            --arg name "$NAME" \
            --arg win_x64 "$BASE_URL/$NAME-windows-x86_64.exe" \
            --arg lin_x64 "$BASE_URL/$NAME-linux-x86_64.tar.gz" \
            --arg mac_arm "$BASE_URL/$NAME-macos-aarch64.dmg" \
            --arg ios_arm "$BASE_URL/$NAME-ios-aarch64.ipa" \
            --arg and_univ "$BASE_URL/$NAME-android-universal.apk" \
            --arg and_arm "$BASE_URL/$NAME-android-arm.apk" \
            --arg and_arm64 "$BASE_URL/$NAME-android-aarch64.apk" \
            --arg and_x64 "$BASE_URL/$NAME-android-x86_64.apk" \
            '{
              version: $version,
              name: $name,
              release: {
                windows: { x86_64: $win_x64 },
                linux: { x86_64: $lin_x64 },
                macos: { aarch64: $mac_arm },
                ios: { aarch64: $ios_arm },
                android: { 
                  universal: $and_univ,
                  arm: $and_arm,
                  aarch64: $and_arm64,
                  x86_64: $and_x64
                }
              }
            }' > dist/latest.json

      - name: Upload to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/*
          file_glob: true
          tag: v${{ steps.meta.outputs.version }}
          overwrite: true
          release_name: "RecomBox v${{ steps.meta.outputs.version }}"
          draft: true